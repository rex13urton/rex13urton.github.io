<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rex's Grill House Events</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <nav>

        <div class="logo">
            <img src="images/logo.png" alt="The Grill House">
        </div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#events">Events</a></li>
            <li><a href="#gallery">Gallery</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

    </nav>

</header>

<section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

        <h2>The Grill House Presents</h2>

        <h1>BBQ Brunch</h1>

        <p>Wednesday • July 1 • 1130-1530</p>

        <div class="hero-buttons">

            <a href="#" class="btn">Reserve Table</a>

            <a href="#events" class="btn secondary">View Events</a>

        </div>

    </div>

</section>

<section id="events" class="events">

    <h2>Upcoming Events</h2>

    <div class="event-grid">

        <div class="event-card">

            <img src="images/event1.jpg" alt="Event">

            <div class="card-content">

                <h3>BBQ Brunch</h3>

                <p>July 1 • 1130-1530</p>

                <button>Details</button>

            </div>

        </div>

        <div class="event-card">

            <img src="images/event2.jpg" alt="Event">

            <div class="card-content">

                <h3>Wine Pairing Dinner</h3>

                <p>August 22 • 6 PM</p>

                <button>Details</button>

            </div>

        </div>

    </div>

</section>

<section id="gallery" class="gallery">

    <h2>Gallery</h2>

    <p>Photos coming soon...</p>

</section>

<footer id="contact">

    <h2>Visit Us</h2>

    <p>Your Address</p>

    <p>Open Daily</p>

</footer>

<script src="script.js"></script>

</body>
</html>
