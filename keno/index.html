<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rex's Keno Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="keno.css">
</head>

<body>

<div class="wrapper">

    <header class="hero">
        <img src="images/RexsKenoDashboard1.png" alt="Rex's Keno Dashboard">
    </header>

    <nav class="navbar">
        <a href="#">Dashboard</a>
        <a href="#">History</a>
        <a href="#">Statistics</a>
        <a href="#">Charts</a>
        <a href="#">Picks</a>
        <a href="#">Settings</a>
    </nav>

    <main>

        <!-- LAST DRAW -->
        <section class="grid-two">

            <div class="card" id="currentDraw">
                <h2>Last Draw</h2>

                <p id="drawMeta">Loading...</p>

                <div class="numbers" id="drawNumbers"></div>
            </div>

            <div class="card" id="summary">
                <h2>Dashboard Summary</h2>

                <ul>
                    <li>Games Tracked <strong>—</strong></li>
                    <li>Latest Draw <strong>—</strong></li>
                    <li>Database Status <strong>Live</strong></li>
                    <li>Last Update <strong>Auto</strong></li>
                </ul>
            </div>

        </section>

        <!-- HEATMAP -->
        <section class="card">
            <h2>Number Heatmap</h2>
            <div class="heatmap" id="heatmap"></div>
        </section>

        <!-- HOT / COLD -->
        <section class="grid-two">

            <div class="card" id="hotNumbers">
                <h2>Hot Numbers</h2>
            </div>

            <div class="card" id="coldNumbers">
                <h2>Cold Numbers</h2>
            </div>

        </section>

        <!-- CHART -->
        <section class="card" id="frequencyChart">
            <h2>Frequency Chart</h2>
        </section>

        <!-- RECENT DRAW TABLE (REAL DATA OR PLACEHOLDER) -->
        <section class="card">
            <h2>Recent Draws</h2>

            <table>
                <thead>
                    <tr>
                        <th>Draw</th>
                        <th>Date</th>
                        <th>Numbers</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Loading…</td>
                        <td>—</td>
                        <td>—</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="keno.js"></script>

</body>
</html>
